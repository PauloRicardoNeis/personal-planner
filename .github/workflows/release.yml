name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
            apps/server-rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: pnpm install

      - name: Build Rust server
        run: pnpm build:server-bin

      - name: Copy server binary to Tauri sidecars
        run: pnpm copy:server-bin

      - name: Build web (desktop mode)
        run: pnpm --filter web build:desktop

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          updaterJsonPreferNsis: true
          tagName: ${{ github.ref_name }}
          releaseName: Planner ${{ github.ref_name }}
          releaseBody: |
            ## O que mudou
            Veja os commits para detalhes.

            ## Instalação
            Baixe `Planner_*_x64-setup.exe` abaixo e execute.
            Se já tiver o app instalado, ele irá atualizar automaticamente.
          args: --config src-tauri/tauri.conf.with-server.json
